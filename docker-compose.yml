services:
  # Banco de dados
  db:
    image: postgres:16
    container_name: education-gestor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: education_gestor
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d education_gestor']
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:16
    container_name: education-gestor-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: education_gestor_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d education_gestor_test']
      interval: 5s
      timeout: 5s
      retries: 5

  # API (Fastify)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: education-gestor-api
    environment:
      NODE_ENV: development
      PORT: '3333'
      DATABASE_URL: postgresql://postgres:postgres@db:5432/education_gestor
      DATABASE_URL_TEST: postgresql://postgres:postgres@db-test:5432/education_gestor_test
      JWT_SECRET: supersecretkey_change_in_production_minimum_32_chars
    ports:
      - '3333:3333'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/types/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: pnpm --filter api dev

  # Frontend (Vite)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: education-gestor-web
    environment:
      NODE_ENV: development
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/types/node_modules
    depends_on:
      - api
    command: pnpm --filter web dev

volumes:
  postgres_data:
