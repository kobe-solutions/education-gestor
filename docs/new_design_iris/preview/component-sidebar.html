<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css">
<style>
body { background:#F8FAFC; }
.card { background:#F8FAFC; padding: 0; flex-direction: row; gap: 0; align-items: stretch; min-height: 320px; }
.side { width: 76px; background:#fff; border-right: 1px solid #E5E7EB; display:flex; flex-direction:column; align-items:center; padding: 0; }
.brand-mark { height: 54px; width: 100%; border-bottom: 1px solid #E5E7EB; display:flex; align-items:center; justify-content:center; }
.nav { display:flex; flex-direction:column; gap: 4px; padding: 10px 8px; width:100%; align-items:stretch; }
.item { display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 4px; padding: 8px 4px; border-radius: 8px; color:#6B7280; cursor:pointer; }
.item:hover { background:#F1F5F9; color:#1F2A37; }
.item.active { background:#185FA5; color:#fff; }
.item .lab { font-size: 10px; font-weight: 600; line-height:1; }
.right { flex: 1; padding: 20px 24px; display:flex; flex-direction:column; gap: 10px; }
.head { display:flex; align-items:center; gap:14px; height: 48px; border-bottom: 1px solid #E5E7EB; padding-bottom: 14px; }
.role { font-size: 12px; color: #6B7280; text-transform: capitalize; }
.school { font-size: 13px; font-weight: 600; color:#0B1E33; }
.title { font-size: 18px; font-weight: 700; color:#0B1E33; }
</style>
</head>
<body><div class="card">
  <div class="side">
    <div class="brand-mark">
      <svg width="30" height="30" viewBox="0 0 120 120">
        <ellipse cx="60" cy="60" rx="46" ry="24" fill="none" stroke="#042C53" stroke-width="3.4"/>
        <circle cx="60" cy="60" r="16" fill="#378ADD"/>
        <circle cx="60" cy="60" r="9" fill="#042C53"/>
      </svg>
    </div>
    <div class="nav">
      <div class="item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span class="lab">Dashboard</span>
      </div>
      <div class="item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <span class="lab">Pessoas</span>
      </div>
      <div class="item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span class="lab">Acadêmico</span>
      </div>
      <div class="item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span class="lab">Financeiro</span>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="head">
      <span class="role">gestor</span>
      <span class="school">Colégio Sagrado Coração</span>
    </div>
    <div class="title">Dashboard</div>
    <div class="muted" style="font-size:13px">A escola tem 412 alunos matriculados em 18 turmas no ano letivo de 2026.</div>
  </div>
</div></body></html>
