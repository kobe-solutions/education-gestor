<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css">
<style>
.btn { display:inline-flex; align-items:center; gap:8px; height:36px; padding: 0 16px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: var(--font-display); border: 1px solid transparent; cursor: pointer; line-height:1; transition: all 160ms cubic-bezier(.22,.61,.36,1); }
.btn.sm { height:32px; padding: 0 12px; font-size: 12px; border-radius:6px; }
.btn.primary { background:#185FA5; color:#fff; }
.btn.primary:hover { background:#134C84; }
.btn.outline { background:#fff; color:#0B1E33; border-color:#D1D5DB; }
.btn.outline:hover { background:#EAF4FD; border-color:#85B7EB; color:#185FA5; }
.btn.ghost { background:transparent; color:#374151; }
.btn.ghost:hover { background:#F1F5F9; color:#0B1E33; }
.btn.danger { background:#B91C1C; color:#fff; }
.btn.disabled { background:#185FA5; color:#fff; opacity:.5; pointer-events:none; }
.row-b { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.label { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); font-weight:600; width: 70px; }
.line { display:flex; gap:10px; align-items:center; }
svg { display:block; }
</style>
</head>
<body><div class="card" style="gap:10px;">
  <div class="line">
    <div class="label">Primary</div>
    <button class="btn primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Novo aluno
    </button>
    <button class="btn primary sm">Salvar</button>
    <button class="btn disabled">Entrando…</button>
  </div>
  <div class="line">
    <div class="label">Outline</div>
    <button class="btn outline">Cancelar</button>
    <button class="btn outline sm">Ver todas</button>
    <button class="btn ghost">Sair</button>
    <button class="btn danger">Excluir</button>
  </div>
</div></body></html>
