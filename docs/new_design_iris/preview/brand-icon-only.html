<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css">
<style>
body { background:#fff; }
.card { padding: 20px; flex-direction:row; align-items:center; gap: 22px; }
.tile { width: 96px; height: 96px; border-radius: 16px; display:flex; align-items:center; justify-content:center; }
.t-l { background:#EAF4FD; }
.t-d { background:#042C53; }
.t-w { background:#fff; border: 1px solid #E5E7EB; }
.cap { font-size: 11px; color: var(--fg-3); margin-top: 6px; font-family: var(--font-mono); }
.col { display:flex; flex-direction:column; align-items:center; gap: 4px; }
.notes { color: var(--fg-2); font-size: 12px; line-height: 1.5; margin-left: auto; max-width: 280px; }
.notes b { color: var(--fg-1); }
</style></head>
<body><div class="card">
  <div class="col"><div class="tile t-w"><img src="../assets/logos/iris-icon.svg" style="width:72px"></div><div class="cap">on white</div></div>
  <div class="col"><div class="tile t-l"><img src="../assets/logos/iris-icon.svg" style="width:72px"></div><div class="cap">on tint</div></div>
  <div class="col"><div class="tile t-d"><img src="../assets/logos/iris-icon.svg" style="width:72px"></div><div class="cap">on inverse</div></div>
  <div class="notes"><b>Ícone — favicon, app icon, marca em espaços pequenos</b><br>Usado quando o ícone aparece sozinho. O olho/livro deve permanecer legível a partir de 24px. Não troque as cores internas.</div>
</div></body></html>
