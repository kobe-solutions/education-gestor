<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card">
  <div class="row" style="gap:14px; align-items:flex-end;">
    <div class="swatch-stack">
      <div class="swatch" style="background:#2C2C2A"></div>
      <div class="swatch-name">Grafite</div>
      <div class="mono">#2C2C2A</div>
    </div>
    <div class="swatch-stack">
      <div class="swatch" style="background:#1F2A37"></div>
      <div class="swatch-name">Slate 900</div>
      <div class="mono">#1F2A37</div>
    </div>
    <div class="swatch-stack">
      <div class="swatch" style="background:#6B7280"></div>
      <div class="swatch-name">Slate 500</div>
      <div class="mono">#6B7280</div>
    </div>
    <div class="swatch-stack">
      <div class="swatch" style="background:#D1D5DB"></div>
      <div class="swatch-name">Slate 300</div>
      <div class="mono">#D1D5DB</div>
    </div>
    <div class="swatch-stack">
      <div class="swatch" style="background:#F1F5F9; border:1px solid #E5E7EB"></div>
      <div class="swatch-name">Slate 100</div>
      <div class="mono">#F1F5F9</div>
    </div>
    <div class="swatch-stack">
      <div class="swatch" style="background:#FFFFFF; border:1px solid #E5E7EB"></div>
      <div class="swatch-name">White</div>
      <div class="mono">#FFFFFF</div>
    </div>
  </div>
</div></body></html>
