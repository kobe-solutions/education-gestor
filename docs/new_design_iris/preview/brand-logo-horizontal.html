<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css">
<style>
body { background:#fff; }
.card { padding: 22px; gap: 14px; }
.h-wrap { padding: 14px; background:#F8FAFC; border-radius: 12px; border:1px solid #E5E7EB; display:flex; align-items:center; justify-content:center; }
.h-wrap img { width: 100%; max-width: 520px; height: auto; display:block; border-radius: 8px; }
.notes { color: var(--fg-2); font-size: 12px; line-height: 1.5; }
.notes b { color: var(--fg-1); }
</style></head>
<body><div class="card">
  <div class="h-wrap"><img src="../assets/logos/iris-horizontal-dark.svg" alt="IRIS Educação logo horizontal escuro"></div>
  <div class="notes"><b>Lockup horizontal escuro</b> — para headers, e-mails transacionais e footers de relatórios. Fundo nativo #042C53 (azul escuro) já incluído no SVG; nunca mover o ícone ou redigitar o texto.</div>
</div></body></html>
