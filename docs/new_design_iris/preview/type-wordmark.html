<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css">
<style>
.brand { display:flex; align-items:center; gap:20px; padding: 6px 4px; }
.iris-mark { font-family: var(--font-display); font-weight: 800; font-size: 56px; color: #042C53; letter-spacing: 3px; line-height:1; }
.iris-sub { font-family: var(--font-display); font-weight: 400; font-size: 14px; color: #185FA5; letter-spacing: 6px; }
.rule { width: 180px; height: 1.5px; background:#378ADD; margin: 6px 0; }
.tag  { font-family: var(--font-display); font-size: 11px; color: #2C2C2A; opacity:.65; letter-spacing:.3px; }
.note { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head>
<body><div class="card">
  <div class="brand">
    <div>
      <div class="iris-mark">IRIS</div>
      <div class="iris-sub">EDUCAÇÃO</div>
      <div class="rule"></div>
      <div class="tag">Visão completa da trajetória de cada aluno</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px; margin-left:auto;">
      <div class="note">Wordmark: Plus Jakarta 800, +3px tracking</div>
      <div class="note">Submark: Plus Jakarta 400, +6px tracking</div>
      <div class="note">Rule: 1.5px, Blue 500 (#378ADD)</div>
      <div class="note">Tagline: Plus Jakarta, 65% grafite</div>
    </div>
  </div>
</div></body></html>
