<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css">
<style>
body { background:#fff; }
.card { padding: 22px 28px; flex-direction: row; align-items: center; gap: 30px; }
.brand { display:flex; gap: 28px; align-items:center; padding: 12px 16px; border:1px solid #E5E7EB; border-radius: 12px; background:#fff; }
.brand img { height: 160px; }
.notes { color: var(--fg-2); font-size: 12px; line-height: 1.6; }
.notes .h { font-weight: 700; color: var(--fg-1); margin-bottom: 4px; font-size: 13px; }
.token { font-family: var(--font-mono); font-size: 11px; color: #185FA5; }
</style></head>
<body><div class="card">
  <div class="brand">
    <img src="../assets/logos/iris-vertical.svg" alt="IRIS Educação logo vertical">
  </div>
  <div class="notes">
    <div class="h">Logo vertical — uso principal</div>
    <p style="margin:0 0 6px;">Em login, decks, ficha do aluno e qualquer espaço onde o IRIS é a âncora visual.</p>
    <div>Min-width: <span class="token">120px</span></div>
    <div>Padding mínimo: <span class="token">altura do ícone ÷ 2</span></div>
    <div>Sobre fundo: <span class="token">#FFFFFF</span> ou <span class="token">#EAF4FD</span></div>
  </div>
</div></body></html>
