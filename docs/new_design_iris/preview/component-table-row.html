<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css">
<style>
.tbl { width:100%; border-collapse: collapse; font-family: var(--font-body); font-size: 13px; background:#fff; border: 1px solid #E5E7EB; border-radius: 10px; overflow: hidden; }
.tbl th { text-align:left; font-weight: 600; font-size: 11px; color: #6B7280; letter-spacing:.04em; text-transform: uppercase; padding: 10px 14px; background:#F8FAFC; border-bottom: 1px solid #E5E7EB; }
.tbl td { padding: 12px 14px; border-bottom: 1px solid #F1F5F9; color: #0B1E33; }
.tbl tr:last-child td { border-bottom: 0; }
.tbl tr.hov td { background:#F8FBFF; }
.code { font-family: var(--font-mono); font-size: 11px; color: #6B7280; }
.bg-b { display:inline-flex; align-items:center; padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; height: 22px; }
.b-success { background:#DCFCE7; color:#15803D; }
.b-warning { background:#FEF3C7; color:#B45309; }
</style>
</head>
