<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IRIS Educação — UI Kit</title>

  <!-- Stylesheet manifest (orders: tokens → primitives → layout → feedback → features) -->
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/logos/iris-icon.svg" />

  <!-- React + Babel runtime -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>

  <!-- ── 1. lib (icons, formatters, seed data) ─────────────────────────── -->
  <script type="text/babel" src="lib/icons.jsx"></script>
  <script type="text/babel" src="lib/formatters.jsx"></script>
  <script type="text/babel" src="lib/seed.jsx"></script>

  <!-- ── 2. components/ui — primitives by type ─────────────────────────── -->
  <script type="text/babel" src="components/ui/forms.jsx"></script>
  <script type="text/babel" src="components/ui/display.jsx"></script>
  <script type="text/babel" src="components/ui/layout.jsx"></script>
  <script type="text/babel" src="components/ui/feedback.jsx"></script>

  <!-- ── 3. components/layout — app shell pieces ───────────────────────── -->
  <script type="text/babel" src="components/layout/Sidebar.jsx"></script>
  <script type="text/babel" src="components/layout/AppHeader.jsx"></script>

  <!-- ── 4. features — one block per domain ────────────────────────────── -->
  <!-- auth -->
  <script type="text/babel" src="features/auth/LoginScreen.jsx"></script>
  <!-- dashboard -->
  <script type="text/babel" src="features/dashboard/DashboardScreen.jsx"></script>
  <!-- hubs -->
  <script type="text/babel" src="features/hubs/PessoasHubScreen.jsx"></script>
  <script type="text/babel" src="features/hubs/AcademicoHubScreen.jsx"></script>
  <!-- students -->
  <script type="text/babel" src="features/students/constants.jsx"></script>
  <script type="text/babel" src="features/students/tabs/PessoalTab.jsx"></script>
  <script type="text/babel" src="features/students/tabs/FamiliaTab.jsx"></script>
  <script type="text/babel" src="features/students/tabs/SaudeTab.jsx"></script>
  <script type="text/babel" src="features/students/tabs/DocumentosTab.jsx"></script>
  <script type="text/babel" src="features/students/tabs/MatriculaTab.jsx"></script>
  <script type="text/babel" src="features/students/AlunosScreen.jsx"></script>
  <script type="text/babel" src="features/students/AlunoDetailScreen.jsx"></script>
  <!-- financial -->
  <script type="text/babel" src="features/financial/MensalidadesScreen.jsx"></script>
  <!-- academic -->
  <script type="text/babel" src="features/academic/EstruturaScreen.jsx"></script>
  <!-- locacao -->
  <script type="text/babel" src="features/locacao/tones.jsx"></script>
  <script type="text/babel" src="features/locacao/LocacaoAulasScreen.jsx"></script>
  <script type="text/babel" src="features/locacao/LocacaoAlunosScreen.jsx"></script>

  <!-- ── 5. Root orchestrator ──────────────────────────────────────────── -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
